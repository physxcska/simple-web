<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Информация о сервере</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .ip-box {
            font-size: 28px;
            font-weight: bold;
            color: #3498db;
            background: #ebf5fb;
            padding: 15px 25px;
            border-radius: 6px;
            display: inline-block;
            letter-spacing: 1px;
            border: 1px solid #d6eaf8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Привет от Apache! 🌐</h1>
        <p>Этот веб-сайт запущен на сервере 123 с IP:</p>
        <div class="ip-box">$SERVER_IP</div>
    </div>
</body>
</html>
